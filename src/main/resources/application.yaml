spring:
  application:
    name: introjd23
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000

server:
  port: 8080
springdoc:
  swagger-ui:
    path: /swagger-ui.html

