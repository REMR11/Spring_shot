spring:
  application:
    name: introjd23
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        database-platform: org.hibernate.dialect.H2Dialect
        format_sql: true
  datasource:
    url: jdbc:h2:mem:devdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

    h2:
      console:
        enabled: true
        path: /h2-console

  hikari:
    maximum-pool-size: 5
    minimum-idle: 2
    connection-timeout: 20000

server:
  port: 8080
springdoc:
  swagger-ui:
    path: /swagger-ui.html

